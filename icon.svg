<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1f1f1f"/>
  <!-- Tire outer -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#eee" stroke-width="28"/>
  <!-- Tire inner (rim) -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="#6cf" stroke-width="14"/>
  <!-- Tread marks -->
  <g stroke="#eee" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="56"  x2="256" y2="96"/>
    <line x1="256" y1="416" x2="256" y2="456"/>
    <line x1="56"  y1="256" x2="96"  y2="256"/>
    <line x1="416" y1="256" x2="456" y2="256"/>
    <line x1="115" y1="115" x2="143" y2="143"/>
    <line x1="369" y1="369" x2="397" y2="397"/>
    <line x1="397" y1="115" x2="369" y2="143"/>
    <line x1="143" y1="369" x2="115" y2="397"/>
  </g>
  <!-- Pressure gauge needle -->
  <g transform="rotate(-30 256 256)">
    <line x1="256" y1="256" x2="256" y2="172" stroke="#ff4040" stroke-width="10" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="14" fill="#ff4040"/>
  </g>
</svg>
